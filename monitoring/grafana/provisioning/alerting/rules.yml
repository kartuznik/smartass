apiVersion: 1

groups:
  - orgId: 1
    name: rag-alerts
    folder: RAG
    interval: 1m
    rules:
      - uid: disk-space-low
        title: Мало места на диске
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 600
              to: 0
            model:
              editorMode: code
              exemplar: false
              expr: ((disk_free_percent{job="bot"} < bool 20) and on() (bot_uptime_seconds{job="bot"} > bool 300) and on() (avg_over_time(up{job="bot"}[2m]) > bool 0.5)) * 100
              intervalMs: 1000
              maxDataPoints: 43200
              range: true
              refId: A
          - refId: B
            datasourceUid: "__expr__"
            relativeTimeRange:
              from: 0
              to: 0
            model:
              datasource:
                type: "__expr__"
                uid: "__expr__"
              expression: A
              reducer: last
              settings:
                mode: dropNN
              type: reduce
              refId: B
          - refId: C
            datasourceUid: "__expr__"
            relativeTimeRange:
              from: 0
              to: 0
            model:
              datasource:
                type: "__expr__"
                uid: "__expr__"
              expression: B
              conditions:
                - evaluator:
                    params:
                      - 50
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - B
                  reducer:
                    params: []
                    type: last
                  type: query
              type: threshold
              refId: C
        for: 1m
        noDataState: OK
        execErrState: OK
        annotations:
          summary: Свободное место в хранилище данных ниже 20%
          description: Свободное место в data storage опустилось ниже 20%, а uptime бота превышает 5 минут.
        labels:
          alertname: DiskSpaceLow
          severity: критическая
          alert_type: ресурсы

      - uid: bot-downtime
        title: Бот не отвечает
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 600
              to: 0
            model:
              editorMode: code
              exemplar: false
              expr: avg_over_time(up{job="bot"}[2m])
              intervalMs: 1000
              maxDataPoints: 43200
              range: true
              refId: A
          - refId: B
            datasourceUid: "__expr__"
            relativeTimeRange:
              from: 0
              to: 0
            model:
              datasource:
                type: "__expr__"
                uid: "__expr__"
              expression: A
              reducer: last
              settings:
                mode: dropNN
              type: reduce
              refId: B
          - refId: C
            datasourceUid: "__expr__"
            relativeTimeRange:
              from: 0
              to: 0
            model:
              datasource:
                type: "__expr__"
                uid: "__expr__"
              expression: B
              conditions:
                - evaluator:
                    params:
                      - 1
                    type: lt
                  operator:
                    type: and
                  query:
                    params:
                      - B
                  reducer:
                    params: []
                    type: last
                  type: query
              type: threshold
              refId: C
        for: 1m
        noDataState: OK
        execErrState: OK
        annotations:
          summary: Бот не отвечает более 2 минут
          description: Метрика доступности бота показывает значение ниже 1 за последние 2 минуты.
        labels:
          alertname: BotDowntime
          severity: критическая
          alert_type: доступность

      - uid: high-error-rate
        title: Высокий уровень ошибок
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 600
              to: 0
            model:
              editorMode: code
              exemplar: false
              expr: (sum(rate(rag_queries_failed_total{job="bot"}[5m])) / clamp_min(sum(rate(rag_queries_total{job="bot"}[5m])), 1)) * 100
              intervalMs: 1000
              maxDataPoints: 43200
              range: true
              refId: A
          - refId: B
            datasourceUid: "__expr__"
            relativeTimeRange:
              from: 0
              to: 0
            model:
              datasource:
                type: "__expr__"
                uid: "__expr__"
              expression: A
              reducer: mean
              settings:
                mode: dropNN
              type: reduce
              refId: B
          - refId: C
            datasourceUid: "__expr__"
            relativeTimeRange:
              from: 0
              to: 0
            model:
              datasource:
                type: "__expr__"
                uid: "__expr__"
              expression: B
              conditions:
                - evaluator:
                    params:
                      - 5
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - B
                  reducer:
                    params: []
                    type: last
                  type: query
              type: threshold
              refId: C
        for: 5m
        noDataState: OK
        execErrState: OK
        annotations:
          summary: Доля ошибок RAG-запросов выше 5%
          description: Ошибки обработки запросов превысили допустимый уровень за последние 5 минут.
        labels:
          alertname: HighErrorRate
          severity: предупреждение
          alert_type: ошибки

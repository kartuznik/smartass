apiVersion: 1

contactPoints:
  - orgId: 1
    name: telegram-ru
    receivers:
      - uid: telegram-ru-receiver
        type: telegram
        settings:
          bottoken: $__env{TELEGRAM_BOT_TOKEN}
          chatid: $__env{TELEGRAM_ALERT_CHAT_ID}
          message: |
            {{ range .Alerts }}
            🚨 *ВНИМАНИЕ: {{ .Labels.alertname }}*

            🔴 Серьезность: *{{ .Labels.severity }}*
            📝 Описание: {{ .Annotations.summary }}
            {{ if .Annotations.description }}🔍 Детали: {{ .Annotations.description }}{{ end }}
            ⏰ Начало: {{ .StartsAt.Format "02.01.2006 15:04:05" }}
            {{ end }}
          parse_mode: "Markdown"
          disable_web_page_preview: true
          protect_content: false

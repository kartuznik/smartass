apiVersion: 1

contactPoints:
  - orgId: 1
    name: telegram-ru
    receivers:
      - uid: telegram-ru-receiver
        type: telegram
        settings:
          bottoken: $__env{TELEGRAM_BOT_TOKEN}
          chatid: $__env{TELEGRAM_ALERT_CHAT_ID}
          message: |
            🚨 *ВНИМАНИЕ: {{ .CommonLabels.alertname }}*

            🔴 Серьезность: *{{ .CommonLabels.severity }}*
            📝 Описание: {{ .CommonAnnotations.summary }}
            {{ if .CommonAnnotations.description }}🔍 Детали: {{ .CommonAnnotations.description }}{{ end }}
            🔗 [Открыть в Grafana]({{ .ExternalURL }})
          parse_mode: "Markdown"
          disable_web_page_preview: true
          protect_content: false

apiVersion: 1

contactPoints:
  - orgId: 1
    name: telegram-ru
    receivers:
      - uid: telegram-ru-receiver
        type: telegram
        settings:
          bottoken: $__env{TELEGRAM_BOT_TOKEN}
          chatid: $__env{TELEGRAM_ALERT_CHAT_ID}
          message: |
            {{ range .Alerts }}
            🚨 *{{ .Labels.alertname }}*

            🔴 Серьезность: *{{ if eq .Labels.severity "critical" }}критическая{{ else if eq .Labels.severity "warning" }}предупреждение{{ else if eq .Labels.severity "error" }}ошибка{{ else }}{{ .Labels.severity }}{{ end }}*
            📝 Описание: {{ .Annotations.summary }}
            {{ if .Annotations.description }}🔍 Детали: {{ .Annotations.description }}{{ end }}
            ⏰ Началось: {{ .StartsAt.Format "02.01.2006 15:04:05" }}
            {{ if eq .Status "resolved" }}✅ Завершилось: {{ .EndsAt.Format "02.01.2006 15:04:05" }}{{ end }}
            💡 Локальное время: {{ .StartsAt.Format "02.01.2006 15:04:05Z07:00" }}

            {{ end }}
            {{ if eq .Status "firing" }}
            🔥 Статус: АКТИВЕН
            {{ else }}
            ✅ Статус: УСТРАНЁН
            {{ end }}
          parse_mode: "Markdown"
          disable_web_page_preview: true
          protect_content: false

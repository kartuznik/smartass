services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "-m", "bot.main"]
    env_file:
      - .env
    user: "0:0"
    volumes:
      - ./data:/app/data
      - ./docs:/app/docs
      - ./logs:/app/logs
    ports:
      - "8001:8001"
    restart: unless-stopped

  mcp:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "-m", "mcp_server.server"]
    env_file:
      - .env
    environment:
      - MCP_SERVER_HOST=0.0.0.0
      - MCP_SERVER_PORT=8000
    volumes:
      - ./data:/app/data
      - ./docs:/app/docs
    ports:
      - "0.0.0.0:8000:8000"
      - "8002:8001"
    restart: unless-stopped
    depends_on:
      - bot
